name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ gcovr

      - name: Configure
        run: cmake -S backend -B backend/build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build backend/build --parallel 4

      - name: Run tests
        run: ctest --test-dir backend/build --output-on-failure

      - name: Check coverage (≥ 90%)
        run: |
          gcovr \
            --root backend \
            --filter backend/src/BigInteger.cpp \
            --filter backend/src/RSA.cpp \
            --filter backend/src/education.cpp \
            --object-directory backend/build \
            --fail-under-line 90 \
            --print-summary
